<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mes Favoris — LuxWatch Maroc</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/ux-fixes.css">
    <link rel="stylesheet" href="css/luxury-final.css">
    <link rel="stylesheet" href="css/mobile-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="site-header"></div>

<div class="page-header">
    <div class="container">
        <h1>Mes Favoris</h1>
        <div class="breadcrumb">
            <a href="index.html">Accueil</a><span>/</span><span>Favoris</span>
        </div>
    </div>
</div>

<div class="container wishlist-layout">
    <div class="products-grid" id="wishlistGrid"></div>
    <div id="wishlistEmpty" style="display:none;">
        <div class="lux-state">
            <div class="lux-state__icon"><i class="fas fa-heart"></i></div>
            <h3>Votre liste est vide</h3>
            <p>Enregistrez les montres qui vous inspirent pour les retrouver ici.</p>
            <a href="shop.html" class="btn btn-primary btn-lg"><i class="fas fa-gem"></i> Explorer la boutique</a>
        </div>
    </div>
</div>

<div id="site-footer"></div>
<div id="site-ui"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js?v=ios-lang3"></script>
<script src="js/luxury-ui.js"></script>
<script src="js/app.js"></script>
<script>
function renderWishlist() {
    const ids  = getWishlist();
    const grid = document.getElementById('wishlistGrid');
    const empty = document.getElementById('wishlistEmpty');
    if (!ids.length) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
    }
    grid.style.display = 'grid';
    empty.style.display = 'none';
    const prods = ids.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
    grid.innerHTML = prods.map(p => createProductCard(p)).join('');
}
document.addEventListener('DOMContentLoaded', renderWishlist);
</script>
</body>
</html>
