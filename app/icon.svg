<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111111"/>
      <stop offset="1" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="gold" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#edd45f"/>
      <stop offset="0.5" stop-color="#c9a227"/>
      <stop offset="1" stop-color="#a67c20"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="150" fill="none" stroke="url(#gold)" stroke-width="14"/>
  <circle cx="256" cy="256" r="120" fill="none" stroke="#2a2a2a" stroke-width="2"/>
  <!-- hour marks -->
  <g stroke="url(#gold)" stroke-width="10" stroke-linecap="round">
    <line x1="256" y1="116" x2="256" y2="146"/>
    <line x1="256" y1="366" x2="256" y2="396"/>
    <line x1="116" y1="256" x2="146" y2="256"/>
    <line x1="366" y1="256" x2="396" y2="256"/>
  </g>
  <!-- hands -->
  <line x1="256" y1="256" x2="256" y2="172" stroke="url(#gold)" stroke-width="14" stroke-linecap="round"/>
  <line x1="256" y1="256" x2="324" y2="290" stroke="#f5f5f0" stroke-width="11" stroke-linecap="round"/>
  <circle cx="256" cy="256" r="14" fill="url(#gold)"/>
</svg>
