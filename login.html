<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Connexion — LuxWatch Maroc</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/ux-fixes.css">
    <link rel="stylesheet" href="css/luxury-final.css">
    <link rel="stylesheet" href="css/mobile-app.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="site-header"></div>

<main class="auth-page">
    <div class="container auth-page__inner">
        <header class="auth-page__head">
            <span class="lw-eyebrow">Espace client</span>
            <h1 class="lw-title">Connexion</h1>
            <p class="lw-body-lg">Accédez à vos réservations et suivis de commande.</p>
        </header>

        <div class="lux-card auth-card">
            <form id="loginForm" class="auth-form" onsubmit="return handleLogin(event)" novalidate>
                <div class="lux-field">
                    <label for="loginEmail">Email</label>
                    <input type="email" id="loginEmail" name="email" required autocomplete="email" placeholder="votre@email.com">
                    <span class="lux-field__error">Email requis</span>
                </div>
                <div class="lux-field">
                    <label for="loginPassword">Mot de passe</label>
                    <input type="password" id="loginPassword" name="password" required autocomplete="current-password" placeholder="••••••••">
                    <span class="lux-field__error">Mot de passe requis</span>
                </div>
                <label class="auth-checkbox">
                    <input type="checkbox" name="remember">
                    <span>Se souvenir de moi</span>
                </label>
                <button type="submit" class="btn btn-primary btn-lg auth-submit">
                    <i class="fas fa-arrow-right"></i> Se connecter
                </button>
            </form>
            <p class="auth-switch">
                Pas encore de compte ?
                <a href="register.html">Créer un compte</a>
            </p>
        </div>
    </div>
</main>

<div id="site-footer"></div>
<div id="site-ui"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js?v=ios-lang3"></script>
<script src="js/luxury-ui.js"></script>
<script src="js/app.js"></script>
<script>
function handleLogin(e) {
    e.preventDefault();
    const form = e.target;
    let valid = true;
    form.querySelectorAll('input[required]').forEach(input => {
        const wrap = input.closest('.lux-field');
        const empty = !input.value.trim();
        wrap?.classList.toggle('is-error', empty);
        if (empty) valid = false;
    });
    if (!valid) return false;
    localStorage.setItem('userLoggedIn', 'true');
    window.location.href = 'account.html';
    return false;
}
</script>
</body>
</html>
