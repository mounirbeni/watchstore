<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8F6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Connexion — LuxWatch Maroc</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="has-tab-bar">

<div id="site-header"></div>

<div class="container auth-container">
    <div class="auth-card">
        <a href="index.html" class="auth-card-logo">
            <div class="logo-icon"><i class="fas fa-clock" aria-hidden="true"></i></div>
            <span class="logo-text">Lux<em>Watch</em></span>
        </a>
        <h2>Bon retour</h2>
        <p class="auth-card-subtitle">Connectez-vous pour accéder à votre espace</p>

        <form id="loginForm" onsubmit="return handleLogin(event)">
            <div class="lux-field">
                <label for="loginEmail">Email *</label>
                <input type="email" id="loginEmail" required placeholder="votre@email.com" autocomplete="email">
                <span class="lux-field__error">Email invalide</span>
            </div>
            <div class="lux-field">
                <label for="loginPassword">Mot de passe *</label>
                <input type="password" id="loginPassword" required placeholder="••••••••" autocomplete="current-password">
                <span class="lux-field__error">Champ requis</span>
            </div>
            <div class="auth-checkbox-row">
                <label class="auth-checkbox-label">
                    <input type="checkbox"> Se souvenir de moi
                </label>
                <a href="#" class="auth-forgot">Mot de passe oublié ?</a>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:15px 24px;font-size:15px;">
                <i class="fas fa-arrow-right" aria-hidden="true"></i> Se connecter
            </button>
        </form>

        <div class="auth-divider">
            Vous n'avez pas de compte ? <a href="register.html">Créer un compte</a>
        </div>
    </div>
</div>

<div id="site-footer"></div>
<div id="site-ui"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script src="js/luxury-ui.js"></script>
<script src="js/app.js"></script>
<script>
function handleLogin(e) {
    e.preventDefault();
    localStorage.setItem('userLoggedIn', 'true');
    showToast('Connexion réussie !');
    setTimeout(() => { window.location.href = 'account.html'; }, 700);
    return false;
}
</script>
</body>
</html>
