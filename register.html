<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Inscription — LuxWatch Maroc</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/ux-fixes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div id="site-header"></div>

<main class="auth-page">
    <div class="container auth-page__inner auth-page__inner--wide">
        <header class="auth-page__head">
            <span class="lw-eyebrow">Rejoignez LuxWatch</span>
            <h1 class="lw-title">Créer un compte</h1>
            <p class="lw-body-lg">Réservez vos montres et suivez vos livraisons en toute sérénité.</p>
        </header>

        <div class="lux-card auth-card">
            <form id="registerForm" class="auth-form" onsubmit="return handleRegister(event)" novalidate>
                <div class="form-row auth-form__row">
                    <div class="lux-field">
                        <label for="firstName">Prénom</label>
                        <input type="text" id="firstName" required placeholder="Prénom">
                        <span class="lux-field__error">Requis</span>
                    </div>
                    <div class="lux-field">
                        <label for="lastName">Nom</label>
                        <input type="text" id="lastName" required placeholder="Nom">
                        <span class="lux-field__error">Requis</span>
                    </div>
                </div>
                <div class="lux-field">
                    <label for="regEmail">Email</label>
                    <input type="email" id="regEmail" required placeholder="votre@email.com">
                    <span class="lux-field__error">Requis</span>
                </div>
                <div class="lux-field">
                    <label for="regPhone">Téléphone</label>
                    <input type="tel" id="regPhone" required placeholder="+212 6XX XX XX XX">
                    <span class="lux-field__error">Requis</span>
                </div>
                <div class="lux-field">
                    <label for="regPass">Mot de passe</label>
                    <input type="password" id="regPass" required minlength="6" placeholder="6 caractères minimum">
                    <span class="lux-field__error">Minimum 6 caractères</span>
                </div>
                <label class="auth-checkbox">
                    <input type="checkbox" required>
                    <span>J'accepte les <a href="terms.html">CGV</a> et la <a href="privacy.html">politique de confidentialité</a>.</span>
                </label>
                <button type="submit" class="btn btn-primary btn-lg auth-submit">
                    <i class="fas fa-user-plus"></i> Créer mon compte
                </button>
            </form>
            <p class="auth-switch">
                Déjà client ?
                <a href="login.html">Se connecter</a>
            </p>
        </div>
    </div>
</main>

<div id="site-footer"></div>
<div id="site-ui"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js?v=ios-lang3"></script>
<script src="js/luxury-ui.js"></script>
<script src="js/app.js"></script>
<script>
function handleRegister(e) {
    e.preventDefault();
    const form = e.target;
    let valid = true;
    form.querySelectorAll('input[required]').forEach(input => {
        const wrap = input.closest('.lux-field');
        let bad = !input.value.trim();
        if (input.minLength && input.value.length < input.minLength) bad = true;
        wrap?.classList.toggle('is-error', bad);
        if (bad) valid = false;
    });
    if (!valid) return false;
    localStorage.setItem('userLoggedIn', 'true');
    showToast('Compte créé avec succès');
    setTimeout(() => { window.location.href = 'account.html'; }, 800);
    return false;
}
</script>
</body>
</html>
