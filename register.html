<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F8F8F6">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Créer un compte — LuxWatch Maroc</title>
    <link rel="stylesheet" href="css/design-system.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/premium.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="has-tab-bar">

<div id="site-header"></div>

<div class="container auth-container">
    <div class="auth-card" style="max-width:520px;">
        <a href="index.html" class="auth-card-logo">
            <div class="logo-icon"><i class="fas fa-clock" aria-hidden="true"></i></div>
            <span class="logo-text">Lux<em>Watch</em></span>
        </a>
        <h2>Rejoignez LuxWatch</h2>
        <p class="auth-card-subtitle">Créez votre espace pour suivre vos commandes</p>

        <form id="registerForm" onsubmit="return handleRegister(event)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
                <div class="lux-field">
                    <label for="regFirstName">Prénom *</label>
                    <input type="text" id="regFirstName" required placeholder="Votre prénom" autocomplete="given-name">
                    <span class="lux-field__error">Champ requis</span>
                </div>
                <div class="lux-field">
                    <label for="regLastName">Nom *</label>
                    <input type="text" id="regLastName" required placeholder="Votre nom" autocomplete="family-name">
                    <span class="lux-field__error">Champ requis</span>
                </div>
            </div>
            <div class="lux-field">
                <label for="regEmail">Email *</label>
                <input type="email" id="regEmail" required placeholder="votre@email.com" autocomplete="email">
                <span class="lux-field__error">Email invalide</span>
            </div>
            <div class="lux-field">
                <label for="regPhone">Téléphone *</label>
                <input type="tel" id="regPhone" required placeholder="+212 6XX XX XX XX" autocomplete="tel">
                <span class="lux-field__error">Numéro invalide</span>
            </div>
            <div class="lux-field">
                <label for="regPassword">Mot de passe *</label>
                <input type="password" id="regPassword" required placeholder="••••••••" autocomplete="new-password">
                <span class="lux-field__error">Minimum 8 caractères</span>
            </div>
            <div class="auth-terms">
                <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
                    <input type="checkbox" required style="accent-color:var(--gold);margin-top:3px;flex-shrink:0;">
                    <span>J'accepte les <a href="terms.html">Conditions Générales</a> et la <a href="privacy.html">Politique de Confidentialité</a>.</span>
                </label>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:15px 24px;font-size:15px;">
                <i class="fas fa-user-plus" aria-hidden="true"></i> Créer mon compte
            </button>
        </form>

        <div class="auth-divider">
            Vous avez déjà un compte ? <a href="login.html">Se connecter</a>
        </div>
    </div>
</div>

<div id="site-footer"></div>
<div id="site-ui"></div>

<script src="js/products.js"></script>
<script src="js/cart.js"></script>
<script src="js/components.js"></script>
<script src="js/luxury-ui.js"></script>
<script src="js/app.js"></script>
<script>
function handleRegister(e) {
    e.preventDefault();
    localStorage.setItem('userLoggedIn', 'true');
    showToast('Compte créé avec succès !');
    setTimeout(() => { window.location.href = 'account.html'; }, 900);
    return false;
}
</script>
</body>
</html>
